<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#EBEEF2" />
  <meta name="color-scheme" content="light dark" />
  <title>ออฟไลน์ — Hinakko Expense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #EBEEF2;
      --surface: #FFFFFF;
      --surface-muted: #EEF1F6;
      --border: #E2E8F0;
      --fg: #0F172A;
      --fg-muted: #64748B;
      --primary: #4F8CFF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #EBEEF2;
        --surface: #171A21;
        --surface-muted: #1E222B;
        --border: #2A3140;
        --fg: #FFFFFF;
        --fg-muted: #94A3B8;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans Thai", ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 320px;
      text-align: center;
    }

    .icon {
      width: 5rem;
      height: 5rem;
      margin: 0 auto 1.25rem;
      border-radius: 0.875rem;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9375rem;
      color: var(--fg-muted);
      line-height: 1.65;
      letter-spacing: 0.01em;
      margin-bottom: 1.5rem;
    }

    .actions { display: flex; flex-direction: column; gap: 0.625rem; }

    button, a {
      display: block;
      width: 100%;
      min-height: 48px;
      border-radius: 0.875rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      line-height: 48px;
    }

    .primary {
      background: var(--primary);
      color: #FFFFFF;
      border: none;
    }

    .ghost {
      background: var(--surface-muted);
      color: var(--fg);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
    <p>ไม่สามารถโหลดหน้านี้ได้ กรุณาตรวจสอบการเชื่อมต่อแล้วลองใหม่อีกครั้ง</p>
    <div class="actions">
      <button type="button" class="primary" onclick="window.location.reload()">ลองใหม่</button>
      <a href="/" class="ghost">กลับหน้า Dashboard</a>
    </div>
  </div>
</body>
</html>
